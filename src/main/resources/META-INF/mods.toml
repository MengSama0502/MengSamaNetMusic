[[mods]]
modId = "mengsamanetmusic"
version = "${mod_version}"
logoFile = "Mod.png"
displayName = "MengSama Net Music"
authors = "MengSama0502, niumadadi520, YuZiJiang"
credits = "Program: MengSama0502 & niumadadi520 | Art: YuZiJiang | Models: niumadadi520"
description = '''
MengSama Net Music is a comprehensive music player mod for Minecraft,
integrating NetEase Cloud Music, QQ Music, and local music playback.

Features:
- Music Player block with custom 3D model
- Portable Music Player with block placement and handheld use
- Playlist management with multiple play modes
- NetEase Cloud Music and QQ Music integration
- Real-time lyrics display and HUD overlay
- Music caching system
- VIP song bypass via login
- Sophisticated Backpacks and Touhou Little Maid compatibility
'''

